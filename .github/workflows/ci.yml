name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --force --tags

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Lint
        run: |
          ruff check .
      
      - name: Temporary failure test
        run: exit 1

  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --force --tags

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade packaging tools
        run: |
          python -m pip install --upgrade pip build

      - name: Install package and test tools
        run: |
          pip install -e .
          pip install pytest

      - name: Run tests
        run: |
          pytest

  ci-complete:
    name: CI
    needs: [lint, tests]
    runs-on: ubuntu-latest
    steps:
      - run: echo "All checks passed"